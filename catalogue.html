<title>Saboplume — Catalogue Traiteur</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = { projectId: "saboplume" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._firestoreReady = true;
  window._doc = doc;
  window._getDoc = getDoc;
  window._updateDoc = updateDoc;
  window._increment = increment;
  window._setDoc = setDoc;
  async function loadAllLikes() {
    try {
      const snap = await getDoc(doc(db, "likes", "catalogue"));
      if (snap.exists()) {
        const data = snap.data();
        Object.entries(data).forEach(([key, count]) => {
          document.querySelectorAll(`.like-count[data-nom="${key}"]`).forEach(el => {
            if (count > 0) el.textContent = count;
          });
        });
      }
    } catch(e) { console.log("Likes load:", e); }
  }
  document.addEventListener("DOMContentLoaded", () => setTimeout(loadAllLikes, 800));
</script>
<style>

  "ENTRÉE EUROPÉENNE": {ribbon:"ribbon-ee",color:"#1565C0",label:"Entrées Européennes",term:"entrées"},
  "PLAT AFRICAIN":     {ribbon:"ribbon-pa",color:"#C2185B",label:"Plats Africains",term:"plats"},
  "PLAT EUROPÉEN":     {ribbon:"ribbon-pe",color:"#6A1B9A",label:"Plats Européens",term:"plats"},
  "MIGNARDISE SALÉE":  {ribbon:"ribbon-ms",color:"#E65100",label:"Mignardises Salées",term:"mignardises"},
  "MIGNARDISE SUCRÉE": {ribbon:"ribbon-mx",color:"#F9A825",label:"Mignardises Sucrées",term:"mignardises"},
  "DESSERT AFRICAIN":  {ribbon:"ribbon-da",color:"#4E342E",label:"Desserts Africains",term:"desserts"},
  "DESSERT EUROPÉEN":  {ribbon:"ribbon-de",color:"#0D47A1",label:"Desserts Européens",term:"desserts"},
};
const ORDER = ["ENTRÉE AFRICAINE","ENTRÉE EUROPÉENNE","PLAT AFRICAIN","PLAT EUROPÉEN","MIGNARDISE SALÉE","MIGNARDISE SUCRÉE","DESSERT AFRICAIN","DESSERT EUROPÉEN"];

function nomKey(n){return n.replace(/[^a-zA-ZÀ-ɏ0-9]/g,'_').toLowerCase();}
function imgUrl(q){return (q&&q.startsWith('http'))?q:`https://source.unsplash.com/400x280/?food`;}

function makeCard(d){
  const m=CAT_META[d.cat], k=nomKey(d.nom);
  return `<div class="card" data-cat="${d.cat}" data-nom="${d.nom.toLowerCase()}" data-desc="${d.desc.toLowerCase()}">
  <div class="card-img-wrap"><img src="${imgUrl(d.img)}" alt="${d.nom}" loading="lazy"
    onerror="this.parentElement.innerHTML='<div class=\'card-img-placeholder\'><span>🍽️</span><small>${d.cat}</small></div>'"/></div>
  <span class="cat-ribbon ${m.ribbon}">${m.label}</span>
  <div class="card-body">
    <div class="card-name">${d.nom}</div>
    <div class="card-desc">${d.desc}</div>
    <div class="card-meta">
      <span class="meta-pill">${d.type}</span>
      <span class="meta-pill meta-origine">${d.origine}</span>
      <span class="like-wrap">
        <button class="like-btn" data-nom="${k}" onclick="doLike(this)">🤍</button>
        <span class="like-count" data-nom="${k}"></span>
      </span>
    </div>
  </div>
</div>`;
}

function buildSections(){
  const c=document.getElementById('main-content');
  let h=`<div class="all-section active" id="section-all"><div class="all-header">Catalogue Complet</div><div class="all-sub">${DISHES.length} spécialités</div><div class="cards-grid">`;
  DISHES.forEach(d=>{h+=makeCard(d);});
  h+=`</div></div>`;
  ORDER.forEach((cat,i)=>{
    const m=CAT_META[cat],items=DISHES.filter(d=>d.cat===cat);
    h+=`<div class="section" id="section-cat-${i}"><div class="section-header"><span class="section-title">${m.label}</span><span class="section-count">${items.length} ${m.term}</span></div><div class="cards-grid">`;
    items.forEach(d=>{h+=makeCard(d);});
    h+=`</div></div>`;
  });
  c.innerHTML=h;
}

function showSection(key){
  document.querySelectorAll('.section,.all-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(key==='all'){document.getElementById('section-all').classList.add('active');}
  else{const i=ORDER.indexOf(key);document.getElementById('section-cat-'+i)?.classList.add('active');}
  document.querySelector(`[data-section="${key}"]`)?.classList.add('active');
  document.getElementById('searchInput').value='';filterCards('');
}

function filterCards(q){
  q=q.toLowerCase().trim();
  const a=document.querySelector('.section.active,.all-section.active');
  if(!a)return;
  a.querySelectorAll('.card').forEach(c=>{
    c.style.display=(!q||c.dataset.nom.includes(q)||c.dataset.desc.includes(q)||c.dataset.cat.toLowerCase().includes(q))?'':'none';
  });
}

function buildNav(){
  const w=document.querySelector('.nav-tabs');w.innerHTML='';
  const t=document.createElement('div');t.className='nav-tab active';t.dataset.section='all';t.textContent='Tous';t.onclick=()=>showSection('all');w.appendChild(t);
  ORDER.forEach(cat=>{
    const tab=document.createElement('div');tab.className='nav-tab';tab.dataset.section=cat;tab.textContent=CAT_META[cat].label;tab.onclick=()=>showSection(cat);w.appendChild(tab);
  });
}

// ── LIKES FIREBASE — plusieurs likes autorisés, compteur cumulatif ──────────
async function doLike(btn){
  btn.classList.add('liked');btn.textContent='❤️';
  setTimeout(()=>{btn.classList.remove('liked');btn.textContent='🤍';},500);
  const key=btn.dataset.nom;
  const countEl=btn.nextElementSibling;
  const cur=parseInt(countEl.textContent)||0;
  countEl.textContent=cur+1;
  if(window._firestoreReady){
    try{
      const ref=_doc(_db,"likes","catalogue");
      const snap=await _getDoc(ref);
      if(snap.exists()){await _updateDoc(ref,{[key]:_increment(1)});}
      else{await _setDoc(ref,{[key]:1});}
    }catch(e){console.log("Like error:",e);}
  }
}

buildNav();
buildSections();
</script>
</body>
</html>
